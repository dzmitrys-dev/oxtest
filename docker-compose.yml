# Code Guardian — reviewer-runnable stack (OPS-01/OPS-02, D-04/D-06/D-07).
#
# `docker compose up` brings up exactly three services — redis + api + worker —
# with NO host-side Trivy or Redis install required. Redis runs as a container;
# the worker reaches the security scanner as a sibling container through the
# mounted Docker socket (D-06), invoking the pinned image
# ghcr.io/aquasecurity/trivy:0.69.3 (matches apps/api/scripts/scan-engine-feasibility.mjs).
#
# Memory cap: the worker uses the TOP-LEVEL `mem_limit` key, NOT
# `deploy.resources.limits.memory` — the latter is SILENTLY IGNORED by
# `docker compose up` in non-swarm mode (RESEARCH Pitfall 1).

services:
  # Broker + scan-record store. Internal-only: no host port is published, so the
  # unauthenticated broker is reachable only by api + worker on the compose
  # network (T-05-02-04).
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # REST API (Fastify). Entrypoint is `node dist/index.js` — the assignment's
  # verbatim self-test command (D-04). Publishes 3000 to the host for the
  # reviewer; keys its healthcheck off GET /health (200 ok / 503 on Redis down).
  #
  # SERVED UI (Bonus A, D-04): this same process also serves the built React SPA
  # at `/` from dist/web (ServeStaticModule) on the SAME origin/port — one URL,
  # no CORS. The SPA is folded into the image by the multi-stage Dockerfile
  # builder (apps/web build → apps/api/dist/web), so `docker compose up` serves
  # REST + GraphQL (/graphql, /graphiql) + the UI on :3000 with no host build.
  # No new service and no second port: exactly three services (redis+api+worker).
  api:
    build:
      context: .
      target: runtime
    image: code-guardian-app:latest
    working_dir: /app/apps/api
    command: node dist/index.js
    environment:
      NODE_ENV: production
      PORT: "3000"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SCAN_TMP_DIR: /tmp/scans
    ports:
      - "3000:3000"
    depends_on:
      - redis
    healthcheck:
      # Node 22 global fetch; exit 0 only when /health returns 2xx.
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Background scan worker — THE memory-critical process. Runs under
  # `--max-old-space-size=150` (75% of the 200m cap, D-07) and is capped by the
  # top-level `mem_limit: 200m`. Reaches the scanner sibling container via the
  # Docker socket mount (D-06). `stop_grace_period: 10s` bounds the SIGTERM->
  # SIGKILL drain window; SHUTDOWN_GRACE_MS (<=9000) closes the drain first (WR-02).
  worker:
    build:
      context: .
      target: runtime
    image: code-guardian-app:latest
    working_dir: /app/apps/api
    command: node --max-old-space-size=150 dist/worker.js
    mem_limit: 200m
    # Cap swap at the RAM limit so `mem_limit: 200m` is a TRUE 200m RAM ceiling,
    # not 200m RAM + 200m swap (WR-02). Keeps the OOM proof honest.
    memswap_limit: 200m
    stop_grace_period: 10s
    # Socket-group access is resolved at runtime by docker-entrypoint.sh (it adds
    # `node` to the mounted socket's actual gid, then drops privileges), so no
    # host-specific DOCKER_GID or group_add is needed — `docker compose up` works
    # unchanged on any host while the scan process stays non-root (D-05 + D-06).
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SCAN_TMP_DIR: /tmp/scans
      TRIVY_MODE: docker
    volumes:
      # D-06: sibling-container scanner. Grants the worker Docker control — an
      # accepted single-tenant take-home trade-off (T-05-02-01), documented for
      # ONBOARDING (Phase 6). Worker still runs as non-root `node` in its own
      # container and only invokes the pinned scanner image.
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared scan workdir (06-UAT fix). Under Docker-outside-of-Docker the
      # worker invokes Trivy against the HOST daemon, so a `-v` bind of the
      # worker's OVERLAY clone dir would resolve to an empty host path. Making
      # /tmp/scans a NAMED VOLUME lets the sibling inherit it verbatim via
      # `docker run --volumes-from <worker>` at the SAME path — the report Trivy
      # writes is the exact path the worker then reads. The Dockerfile pre-owns
      # /tmp/scans as `node`, so the volume initializes writable for non-root.
      # Reclaim with `docker compose down -v`.
      - scans:/tmp/scans
    depends_on:
      - redis
    restart: unless-stopped

# Named volume backing the per-scan workdir shared with the Trivy sibling
# container (see the worker `volumes:` note above).
volumes:
  scans:
